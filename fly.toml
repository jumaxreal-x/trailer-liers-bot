app = "trailer-liers"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/wa/status"

[[mounts]]
  source = "wa_state"
  destination = "/app/artifacts/api-server/.wa-state"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
